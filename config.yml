# MineClaw 配置文件
llm:
  model: "Qwen/Qwen3-VL-235B-A22B-Instruct"
  endpoint: "https://api.siliconflow.cn/v1"
  api_key: "${OPENAI_API_KEY}"
  vision_base64: true
  max_retries: 3

minecraft:
  host: java.applemc.fun
  port: 25565
  username: MineClawBot
  view_distance: 2

api:
  # HTTP API 地址 (本机用 localhost，其他机器用 IP)
  host: "localhost"
  port: 3005

voyager:
  skill_library_path: ./data/skills.json
  auto_save: true

logging:
  level: INFO
