# MineClaw 配置文件
# 请根据实际情况修改

# LLM 配置 (OpenAI 兼容接口)
llm:
  # 模型名称，如 gpt-4o, gpt-4o-mini, claude-3-5-sonnet 等
  model: gpt-4o-mini
  # API 端点 (OpenAI 或兼容的第三方)
  endpoint: https://api.openai.com/v1
  # API 密钥（支持环境变量 ${OPENAI_API_KEY}）
  api_key: ${OPENAI_API_KEY}
  # 传入图片的 base64 编码 (true) 还是 URL (false)
  vision_base64: true
  # 最大重试次数
  max_retries: 3

# Minecraft 服务器配置
minecraft:
  # 服务器地址
  host: java.applemc.fun
  # 服务器端口
  port: 25565
  # 机器人用户名
  username: MineClawBot
  # 视距（影响性能）
  view_distance: 2

# HTTP API 配置
api:
  # HTTP API 端口 (mineflayer-http-api)
  port: 3005

# Voyager 技能库配置
voyager:
  # 技能库保存路径
  skill_library_path: ./data/skills.json
  # 自动保存技能
  auto_save: true
  # 最低成功率阈值 (低于此值不写入技能库)
  min_success_rate: 0.5

# 日志配置
logging:
  level: INFO
  file: ./logs/mineclaw.log
